<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- 主背景渐变：蓝 → 红 → 金 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a2a6c"/>
      <stop offset="50%" stop-color="#7a1a52"/>
      <stop offset="85%" stop-color="#b21f1f"/>
      <stop offset="100%" stop-color="#fdbb2d"/>
    </linearGradient>

    <!-- 顶部光晕 -->
    <radialGradient id="glowTop" cx="20%" cy="15%" r="55%">
      <stop offset="0%" stop-color="#3a5ad4" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#1a2a6c" stop-opacity="0"/>
    </radialGradient>

    <!-- 底部暖光 -->
    <radialGradient id="glowBottom" cx="85%" cy="90%" r="50%">
      <stop offset="0%" stop-color="#fdbb2d" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#b21f1f" stop-opacity="0"/>
    </radialGradient>

    <!-- 图标渐变 -->
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#64b5f6"/>
      <stop offset="100%" stop-color="#42a5f5"/>
    </linearGradient>

    <!-- 金色强调渐变 -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fdbb2d"/>
      <stop offset="100%" stop-color="#f9a825"/>
    </linearGradient>

    <!-- 文字发光 -->
    <filter id="textGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- 图标阴影 -->
    <filter id="iconShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>

    <!-- 网格图案 -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="0.5"/>
    </pattern>

    <!-- 斜线装饰图案 -->
    <pattern id="diagonalLines" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="8" stroke="rgba(255,255,255,0.04)" stroke-width="1.5"/>
    </pattern>
  </defs>

  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- 装饰纹理层 -->
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#diagonalLines)"/>

  <!-- 光晕 -->
  <rect width="1200" height="630" fill="url(#glowTop)"/>
  <rect width="1200" height="630" fill="url(#glowBottom)"/>

  <!-- ===== 左侧代码尖括号装饰 ===== -->
  <g opacity="0.08" fill="none" stroke="#ffffff" stroke-width="2">
    <!-- 大号尖括号 -->
    <polyline points="60,315 160,230 160,400"/>
    <polyline points="1140,315 1040,230 1040,400"/>
    <!-- 嵌套括号 -->
    <polyline points="80,315 170,245 170,385"/>
    <polyline points="1120,315 1030,245 1030,385"/>
  </g>

  <!-- 左侧代码行装饰 -->
  <g opacity="0.06" fill="#ffffff">
    <rect x="100" y="140" width="80" height="4" rx="2"/>
    <rect x="100" y="155" width="120" height="4" rx="2"/>
    <rect x="100" y="170" width="60" height="4" rx="2"/>
    <rect x="100" y="195" width="100" height="4" rx="2"/>
    <rect x="100" y="210" width="140" height="4" rx="2"/>
    <rect x="100" y="225" width="70" height="4" rx="2"/>

    <!-- 右侧代码行装饰 -->
    <rect x="990" y="420" width="90" height="4" rx="2"/>
    <rect x="990" y="435" width="130" height="4" rx="2"/>
    <rect x="990" y="450" width="50" height="4" rx="2"/>
    <rect x="990" y="475" width="110" height="4" rx="2"/>
    <rect x="990" y="490" width="140" height="4" rx="2"/>
    <rect x="990" y="505" width="80" height="4" rx="2"/>
  </g>

  <!-- ===== 中央图标组合：服务器 + 数据库 ===== -->
  <g transform="translate(600, 230)" filter="url(#iconShadow)">
    <!-- 服务器机箱 -->
    <rect x="-100" y="-70" width="200" height="140" rx="8" fill="#1e293b" stroke="#4a6fa5" stroke-width="2" opacity="0.9"/>

    <!-- 服务器顶部装饰条 -->
    <rect x="-92" y="-62" width="184" height="8" rx="3" fill="url(#accentGrad)" opacity="0.35"/>

    <!-- 服务器指示灯 -->
    <circle cx="-72" cy="-50" r="4" fill="#4caf50" opacity="0.9"/>
    <circle cx="-56" cy="-50" r="4" fill="#4caf50" opacity="0.6"/>
    <circle cx="-40" cy="-50" r="4" fill="#ff9800" opacity="0.7"/>

    <!-- 服务器硬盘槽 1 -->
    <rect x="-76" y="-35" width="60" height="18" rx="3" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <rect x="-70" y="-31" width="48" height="2" rx="1" fill="#3b82f6" opacity="0.6"/>
    <rect x="-70" y="-26" width="48" height="2" rx="1" fill="#3b82f6" opacity="0.4"/>
    <rect x="-70" y="-21" width="48" height="2" rx="1" fill="#3b82f6" opacity="0.5"/>

    <!-- 服务器硬盘槽 2 -->
    <rect x="16" y="-35" width="60" height="18" rx="3" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <rect x="22" y="-31" width="48" height="2" rx="1" fill="#3b82f6" opacity="0.6"/>
    <rect x="22" y="-26" width="48" height="2" rx="1" fill="#3b82f6" opacity="0.4"/>
    <rect x="22" y="-21" width="48" height="2" rx="1" fill="#3b82f6" opacity="0.5"/>

    <!-- 服务器硬盘槽 3 -->
    <rect x="-76" y="-8" width="60" height="18" rx="3" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <rect x="-70" y="-4" width="48" height="2" rx="1" fill="#3b82f6" opacity="0.6"/>
    <rect x="-70" y="1" width="48" height="2" rx="1" fill="#3b82f6" opacity="0.4"/>
    <rect x="-70" y="6" width="48" height="2" rx="1" fill="#3b82f6" opacity="0.5"/>

    <!-- 服务器硬盘槽 4 -->
    <rect x="16" y="-8" width="60" height="18" rx="3" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <rect x="22" y="-4" width="48" height="2" rx="1" fill="#3b82f6" opacity="0.6"/>
    <rect x="22" y="1" width="48" height="2" rx="1" fill="#3b82f6" opacity="0.4"/>
    <rect x="22" y="6" width="48" height="2" rx="1" fill="#3b82f6" opacity="0.5"/>

    <!-- 服务器底部装饰 -->
    <rect x="-92" y="22" width="184" height="40" rx="4" fill="#0f172a" stroke="#334155" stroke-width="1" opacity="0.8"/>

    <!-- 通风槽 -->
    <g stroke="#334155" stroke-width="1.5" opacity="0.5">
      <line x1="-80" y1="32" x2="-20" y2="32"/>
      <line x1="-80" y1="38" x2="-20" y2="38"/>
      <line x1="-80" y1="44" x2="-20" y2="44"/>
      <line x1="-80" y1="50" x2="-20" y2="50"/>
      <line x1="20" y1="32" x2="80" y2="32"/>
      <line x1="20" y1="38" x2="80" y2="38"/>
      <line x1="20" y1="44" x2="80" y2="44"/>
      <line x1="20" y1="50" x2="80" y2="50"/>
    </g>

    <!-- 网络/数据连接线（左侧） -->
    <g opacity="0.7">
      <line x1="-100" y1="-10" x2="-140" y2="-10" stroke="#64b5f6" stroke-width="2"/>
      <line x1="-100" y1="10" x2="-140" y2="10" stroke="#64b5f6" stroke-width="2"/>
      <line x1="-100" y1="30" x2="-140" y2="30" stroke="#64b5f6" stroke-width="2"/>
      <!-- 数据点 -->
      <circle cx="-130" cy="-10" r="4" fill="#fdbb2d" opacity="0.8"/>
      <circle cx="-138" cy="10" r="4" fill="#fdbb2d" opacity="0.5"/>
      <circle cx="-125" cy="30" r="4" fill="#fdbb2d" opacity="0.6"/>
    </g>

    <!-- 网络/数据连接线（右侧） -->
    <g opacity="0.7">
      <line x1="100" y1="-10" x2="140" y2="-10" stroke="#64b5f6" stroke-width="2"/>
      <line x1="100" y1="10" x2="140" y2="10" stroke="#64b5f6" stroke-width="2"/>
      <line x1="100" y1="30" x2="140" y2="30" stroke="#64b5f6" stroke-width="2"/>
      <circle cx="125" cy="-10" r="4" fill="#fdbb2d" opacity="0.7"/>
      <circle cx="138" cy="10" r="4" fill="#fdbb2d" opacity="0.5"/>
      <circle cx="130" cy="30" r="4" fill="#fdbb2d" opacity="0.8"/>
    </g>

    <!-- 数据库图标叠加（顶部悬浮） -->
    <g transform="translate(60, -60)">
      <!-- 数据库圆柱体 -->
      <ellipse cx="0" cy="-12" rx="28" ry="10" fill="#1e293b" stroke="#4a6fa5" stroke-width="1.5"/>
      <rect x="-28" y="-12" width="56" height="24" fill="#1e293b" stroke="none"/>
      <path d="M-28,-12 L-28,12 A28,10 0 0,0 28,12 L28,-12" fill="none" stroke="#4a6fa5" stroke-width="1.5"/>
      <ellipse cx="0" cy="-12" rx="28" ry="10" fill="none" stroke="#4a6fa5" stroke-width="1.5"/>
      <ellipse cx="0" cy="12" rx="28" ry="10" fill="#1e293b" stroke="#4a6fa5" stroke-width="1.5"/>
      <!-- 数据库装饰横线 -->
      <line x1="-28" y1="-4" x2="28" y2="-4" stroke="#4a6fa5" stroke-width="1" opacity="0.4"/>
      <line x1="-28" y1="4" x2="28" y2="4" stroke="#4a6fa5" stroke-width="1" opacity="0.4"/>
    </g>
  </g>

  <!-- ===== 标题文字 ===== -->
  <text x="600" y="395" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', 'WenQuanYi Micro Hei', sans-serif" font-size="52" font-weight="bold" fill="#ffffff" filter="url(#textGlow)" letter-spacing="6">
    Java 后端面试知识
  </text>

  <!-- 标题下方装饰线 -->
  <g transform="translate(600, 418)">
    <line x1="-180" y1="0" x2="-150" y2="0" stroke="#fdbb2d" stroke-width="3" stroke-linecap="round"/>
    <line x1="-145" y1="0" x2="-20" y2="0" stroke="#fdbb2d" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
    <circle cx="-10" cy="0" r="5" fill="#fdbb2d" opacity="0.8"/>
    <line x1="0" y1="0" x2="120" y2="0" stroke="#fdbb2d" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
    <line x1="125" y1="0" x2="180" y2="0" stroke="#fdbb2d" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- ===== 副标题 ===== -->
  <text x="600" y="460" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', 'WenQuanYi Micro Hei', sans-serif" font-size="22" fill="rgba(255,255,255,0.75)" letter-spacing="2">
    从 Java 基础到 Spring 框架，构建可讲清楚的知识体系
  </text>

  <!-- ===== 底部信息 ===== -->
  <g transform="translate(600, 570)">
    <!-- 底部分隔线 -->
    <line x1="-350" y1="-20" x2="350" y2="-20" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

    <text text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif" font-size="16" fill="rgba(255,255,255,0.45)" letter-spacing="4">
      CS Job Guide · 计算机求职指南
    </text>
  </g>

  <!-- ===== 右上角装饰：抽象网络节点 ===== -->
  <g transform="translate(1050, 80)" opacity="0.15">
    <circle cx="0" cy="0" r="30" fill="none" stroke="#ffffff" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="20" fill="none" stroke="#ffffff" stroke-width="1"/>
    <circle cx="0" cy="0" r="4" fill="#ffffff"/>
    <!-- 连接线 -->
    <line x1="30" y1="0" x2="70" y2="-20" stroke="#ffffff" stroke-width="1"/>
    <line x1="30" y1="0" x2="70" y2="20" stroke="#ffffff" stroke-width="1"/>
    <line x1="-30" y1="0" x2="-70" y2="-25" stroke="#ffffff" stroke-width="1"/>
    <line x1="-30" y1="0" x2="-60" y2="30" stroke="#ffffff" stroke-width="1"/>
    <!-- 子节点 -->
    <circle cx="70" cy="-20" r="8" fill="none" stroke="#ffffff" stroke-width="1"/>
    <circle cx="70" cy="20" r="8" fill="none" stroke="#ffffff" stroke-width="1"/>
    <circle cx="-70" cy="-25" r="8" fill="none" stroke="#ffffff" stroke-width="1"/>
    <circle cx="-60" cy="30" r="8" fill="none" stroke="#ffffff" stroke-width="1"/>
    <!-- 子节点内圈 -->
    <circle cx="70" cy="-20" r="3" fill="#ffffff"/>
    <circle cx="70" cy="20" r="3" fill="#ffffff"/>
    <circle cx="-70" cy="-25" r="3" fill="#ffffff"/>
    <circle cx="-60" cy="30" r="3" fill="#ffffff"/>
  </g>

  <!-- ===== 左下角装饰：抽象代码结构 ===== -->
  <g transform="translate(150, 550)" opacity="0.1">
    <rect x="0" y="-50" width="120" height="50" rx="4" fill="none" stroke="#ffffff" stroke-width="1.5"/>
    <rect x="0" y="-50" width="25" height="50" rx="4" fill="none" stroke="#ffffff" stroke-width="1.5"/>
    <rect x="130" y="-50" width="120" height="50" rx="4" fill="none" stroke="#ffffff" stroke-width="1.5"/>
    <rect x="130" y="-50" width="25" height="50" rx="4" fill="none" stroke="#ffffff" stroke-width="1.5"/>
    <!-- 堆叠效果 -->
    <rect x="10" y="-65" width="120" height="50" rx="4" fill="none" stroke="#ffffff" stroke-width="0.8" opacity="0.6"/>
    <rect x="140" y="-65" width="120" height="50" rx="4" fill="none" stroke="#ffffff" stroke-width="0.8" opacity="0.6"/>
  </g>

  <!-- ===== 底部金色点缀粒子 ===== -->
  <g opacity="0.25">
    <circle cx="200" cy="580" r="1.5" fill="#fdbb2d"/>
    <circle cx="250" cy="590" r="1" fill="#fdbb2d"/>
    <circle cx="950" cy="585" r="1.5" fill="#fdbb2d"/>
    <circle cx="1000" cy="575" r="1" fill="#fdbb2d"/>
    <circle cx="350" cy="595" r="1" fill="#fdbb2d"/>
    <circle cx="850" cy="590" r="1" fill="#fdbb2d"/>
  </g>

  <!-- ===== Java 标记（左下角） ===== -->
  <g transform="translate(80, 480)" opacity="0.12">
    <rect x="0" y="-18" width="70" height="36" rx="6" fill="none" stroke="#ffffff" stroke-width="2"/>
    <text x="35" y="6" text-anchor="middle" font-family="'Courier New', monospace" font-size="24" font-weight="bold" fill="#ffffff" letter-spacing="2">Java</text>
  </g>

  <!-- ===== Spring 标记（右下角） ===== -->
  <g transform="translate(1050, 480)" opacity="0.12">
    <rect x="-70" y="-18" width="70" height="36" rx="6" fill="none" stroke="#ffffff" stroke-width="2"/>
    <text x="-35" y="6" text-anchor="middle" font-family="'Courier New', monospace" font-size="18" font-weight="bold" fill="#ffffff" letter-spacing="1">Spring</text>
  </g>
</svg>
